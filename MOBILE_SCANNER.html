<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Склад Бригада - QR Сканер</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }
        
        .header {
            background: #16213e;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #e94560;
        }
        
        .header h1 {
            font-size: 1.2rem;
            color: #e94560;
        }
        
        .scanner-container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        #reader {
            width: 100% !important;
            border: none !important;
            border-radius: 15px;
            overflow: hidden;
        }
        
        #reader video {
            border-radius: 15px;
        }
        
        /* Скрыть ненужные элементы сканера */
        #reader__dashboard_section_csr span,
        #reader__dashboard_section_swaplink {
            display: none !important;
        }
        
        #reader__camera_selection {
            background: #16213e;
            color: #fff;
            border: 1px solid #e94560;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            width: 100%;
        }
        
        .result-card {
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #0f3460;
        }
        
        .result-card.found {
            border-left-color: #16c79a;
        }
        
        .result-card.error {
            border-left-color: #e94560;
        }
        
        .hanger-number {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
            margin-bottom: 10px;
        }
        
        .fabric-name {
            font-size: 1.3rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #0f3460;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #a0a0a0;
            font-size: 0.9rem;
        }
        
        .info-value {
            font-weight: 600;
        }
        
        .info-value.stock-low {
            color: #e94560;
        }
        
        .info-value.stock-ok {
            color: #16c79a;
        }
        
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #e94560;
            color: #fff;
        }
        
        .btn-primary:active {
            background: #ff6b6b;
        }
        
        .btn-secondary {
            background: #0f3460;
            color: #fff;
        }
        
        .btn-secondary:active {
            background: #1a4a7a;
        }
        
        .manual-input {
            margin-top: 20px;
            padding: 20px;
            background: #16213e;
            border-radius: 15px;
        }
        
        .manual-input h3 {
            margin-bottom: 15px;
            color: #a0a0a0;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group input {
            flex: 1;
            padding: 15px;
            border: 2px solid #0f3460;
            background: #1a1a2e;
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
            text-transform: uppercase;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        .loader {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }
        
        .error-message {
            color: #e94560;
            text-align: center;
            padding: 20px;
        }
        
        .last-scanned {
            margin-top: 20px;
            padding: 15px;
            background: #0f3460;
            border-radius: 10px;
            font-size: 0.85rem;
        }
        
        .last-scanned-title {
            color: #a0a0a0;
            margin-bottom: 5px;
        }
        
        /* Модальное окно пополнения */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: #16213e;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
        }
        
        .modal h3 {
            margin-bottom: 20px;
            color: #16c79a;
        }
        
        .modal-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #0f3460;
            background: #1a1a2e;
            color: #fff;
            border-radius: 10px;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .modal-input:focus {
            outline: none;
            border-color: #16c79a;
        }
        
        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .btn-success {
            background: #16c79a;
            color: #fff;
        }
        
        .btn-cancel {
            background: #444;
            color: #fff;
        }
        
        /* Стили логина */
        .login-card {
            background: #16213e;
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
        }
        
        .login-card h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #16c79a;
        }
        
        .login-card input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #0f3460;
            background: #1a1a2e;
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
        }
        
        .login-card input:focus {
            outline: none;
            border-color: #16c79a;
        }
        
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #16213e;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .btn-logout {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 СКАНЕР СКЛАДА</h1>
    </div>
    
    <!-- Форма логина -->
    <div id="loginSection" class="scanner-container">
        <div class="login-card">
            <h3>🔐 Вход в систему</h3>
            <input type="email" id="email" placeholder="Email" value="admin@brigada.com">
            <input type="password" id="password" placeholder="Пароль" value="admin123">
            <button class="btn btn-primary" onclick="login()">Войти</button>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>
    
    <div id="scannerSection" class="scanner-container" style="display:none;">
        <div class="user-bar">
            <span id="userName"></span>
            <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
        <!-- Камера -->
        <div id="reader"></div>
        
        <!-- Результат сканирования -->
        <div id="result"></div>
        
        <!-- Ручной ввод -->
        <div class="manual-input">
            <h3>Или введите номер вручную</h3>
            <div class="input-group">
                <input type="text" id="manualHanger" placeholder="Например: A-101" maxlength="10">
                <button class="btn btn-primary" onclick="lookupManual()">Найти</button>
            </div>
        </div>
        
        <!-- История -->
        <div class="last-scanned">
            <div class="last-scanned-title">Последнее сканирование:</div>
            <div id="history">-</div>
        </div>
    </div>
    
    <!-- Модальное окно пополнения -->
    <div class="modal-overlay" id="restockModal">
        <div class="modal">
            <h3>📦 Пополнить остаток</h3>
            <div id="restockFabricName" style="margin-bottom: 15px; color: #a0a0a0;"></div>
            <input type="number" id="restockAmount" class="modal-input" placeholder="0.0" step="0.1" min="0">
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn btn-success" onclick="confirmRestock()">Добавить</button>
            </div>
        </div>
    </div>

    <script>
        // API URL (замени на свой при деплое)
        const API_URL = 'http://localhost:5000/api';
        
        let currentFabric = null;
        let scanner = null;
        let authToken = localStorage.getItem('brigada_token');
        let currentUser = JSON.parse(localStorage.getItem('brigada_user') || '{}');
        
        // Проверка авторизации при загрузке
        function checkAuth() {
            if (authToken) {
                showScanner();
                document.getElementById('userName').textContent = currentUser.full_name || 'Пользователь';
            } else {
                showLogin();
            }
        }
        
        function showLogin() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('scannerSection').style.display = 'none';
        }
        
        function showScanner() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('scannerSection').style.display = 'block';
            initScanner();
        }
        
        // Логин
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.data.token;
                    currentUser = data.data.user;
                    localStorage.setItem('brigada_token', authToken);
                    localStorage.setItem('brigada_user', JSON.stringify(currentUser));
                    document.getElementById('userName').textContent = currentUser.full_name;
                    showScanner();
                } else {
                    errorDiv.textContent = data.error?.message || 'Ошибка входа';
                }
            } catch (error) {
                errorDiv.textContent = 'Ошибка соединения с сервером';
            }
        }
        
        // Выход
        function logout() {
            localStorage.removeItem('brigada_token');
            localStorage.removeItem('brigada_user');
            authToken = null;
            currentUser = {};
            if (scanner) {
                scanner.stop().catch(() => {});
            }
            showLogin();
        }
        
        // Хелпер для авторизованных запросов
        async function authFetch(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${authToken}`,
                ...options.headers
            };
            return fetch(url, { ...options, headers });
        }

        // Инициализация сканера
        function initScanner() {
            scanner = new Html5Qrcode("reader");
            
            const config = {
                fps: 10,
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1
            };
            
            scanner.start(
                { facingMode: "environment" },  // Задняя камера
                config,
                onScanSuccess,
                onScanError
            ).catch(err => {
                console.error('Ошибка камеры:', err);
                document.getElementById('result').innerHTML = `
                    <div class="result-card error">
                        <div class="error-message">
                            ⚠️ Нет доступа к камере.<br>
                            Разрешите доступ или используйте ручной ввод.
                        </div>
                    </div>
                `;
            });
        }

        // Успешное сканирование
        async function onScanSuccess(decodedText) {
            console.log('QR отсканирован:', decodedText);
            
            // Останавливаем сканер на момент
            await scanner.pause();
            
            // Извлекаем номер вешалки из QR
            // Форматы: "A-101", "https://atelier.ru/fabric/A-101", "A101"
            let hangerNumber = extractHangerNumber(decodedText);
            
            if (hangerNumber) {
                await lookupFabric(hangerNumber);
                updateHistory(hangerNumber);
            } else {
                showError('Неверный формат QR кода');
            }
            
            // Возобновляем сканер через 2 секунды
            setTimeout(() => scanner.resume(), 2000);
        }

        function onScanError(error) {
            // Игнорируем ошибки сканирования (когда QR не найден)
        }

        // Извлечение номера вешалки из текста QR
        function extractHangerNumber(text) {
            // Паттерны: A-101, B-205, Z-999
            const match = text.match(/([A-Z]-\d{3})/);
            if (match) return match[1];
            
            // Если просто буква-цифры без дефиса
            const altMatch = text.match(/([A-Z])(\d{3})/);
            if (altMatch) return `${altMatch[1]}-${altMatch[2]}`;
            
            return null;
        }

        // Поиск ткани по API
        async function lookupFabric(hangerNumber) {
            showLoader();
            
            try {
                const response = await authFetch(`${API_URL}/fabrics/by-hanger/${hangerNumber}`);
                const data = await response.json();
                
                if (data.success) {
                    currentFabric = data.data;
                    showFabricResult(data.data);
                } else {
                    showError('Ткань не найдена');
                }
            } catch (error) {
                showError('Ошибка соединения с сервером');
                console.error(error);
            }
        }

        // Ручной поиск
        function lookupManual() {
            const input = document.getElementById('manualHanger');
            const value = input.value.trim().toUpperCase();
            
            if (value) {
                const formatted = formatHangerNumber(value);
                lookupFabric(formatted);
                updateHistory(formatted);
                input.value = '';
            }
        }

        function formatHangerNumber(text) {
            // A101 → A-101
            if (/^[A-Z]\d{3}$/.test(text)) {
                return `${text[0]}-${text.slice(1)}`;
            }
            return text;
        }

        // Отображение информации о ткани
        function showFabricResult(fabric) {
            const stockClass = fabric.stock_meters < 10 ? 'stock-low' : 'stock-ok';
            const stockStatus = fabric.stock_meters < 10 ? '⚠️ Низкий остаток' : '✅ В наличии';
            
            document.getElementById('result').innerHTML = `
                <div class="result-card found">
                    <div class="hanger-number">${fabric.hanger_number}</div>
                    <div class="fabric-name">${fabric.name}</div>
                    
                    <div class="info-row">
                        <span class="info-label">Состав:</span>
                        <span class="info-value">${fabric.composition || '-'}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Цвет:</span>
                        <span class="info-value">${fabric.color || '-'}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Ширина:</span>
                        <span class="info-value">${fabric.width_cm ? fabric.width_cm + ' см' : '-'}</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Остаток:</span>
                        <span class="info-value ${stockClass}">
                            ${fabric.stock_meters} м (${stockStatus})
                        </span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Цена:</span>
                        <span class="info-value">${fabric.price_per_meter.toLocaleString()} ₽/м</span>
                    </div>
                    
                    <div class="info-row">
                        <span class="info-label">Поставщик:</span>
                        <span class="info-value">${fabric.supplier || '-'}</span>
                    </div>
                    
                    <div class="actions">
                        <button class="btn btn-primary" onclick="openRestockModal()">
                            📦 Пополнить
                        </button>
                        <button class="btn btn-secondary" onclick="createOrder()">
                            🛒 В заказ
                        </button>
                    </div>
                </div>
            `;
        }

        function showLoader() {
            document.getElementById('result').innerHTML = `
                <div class="loader">⏳ Загрузка...</div>
            `;
        }

        function showError(message) {
            document.getElementById('result').innerHTML = `
                <div class="result-card error">
                    <div class="error-message">${message}</div>
                </div>
            `;
        }

        function updateHistory(hangerNumber) {
            const time = new Date().toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            document.getElementById('history').innerHTML = `
                <strong>${hangerNumber}</strong> — ${time}
            `;
        }

        // Модальное окно пополнения
        function openRestockModal() {
            if (!currentFabric) return;
            
            document.getElementById('restockFabricName').textContent = currentFabric.name;
            document.getElementById('restockAmount').value = '';
            document.getElementById('restockModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('restockModal').classList.remove('active');
        }

        async function confirmRestock() {
            const amount = parseFloat(document.getElementById('restockAmount').value);
            
            if (!amount || amount <= 0) {
                alert('Введите корректное количество');
                return;
            }
            
            try {
                const response = await authFetch(`${API_URL}/fabrics/${currentFabric.id}/add-stock`, {
                    method: 'POST',
                    body: JSON.stringify({ amount })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`✅ Добавлено ${amount}м на склад!`);
                    closeModal();
                    // Обновляем отображение
                    lookupFabric(currentFabric.hanger_number);
                } else {
                    alert('❌ Ошибка: ' + data.error.message);
                }
            } catch (error) {
                alert('❌ Ошибка соединения');
            }
        }

        // Создать заказ с этой тканью
        function createOrder() {
            if (!currentFabric) return;
            
            const url = `/orders/new?fabric_id=${currentFabric.id}&fabric_name=${encodeURIComponent(currentFabric.name)}`;
            // В реальном приложении: window.location.href = url;
            alert(`Переход к созданию заказа с тканью ${currentFabric.name}\nВ реальном приложении здесь откроется форма заказа.`);
        }

        // Enter в поле ввода
        document.getElementById('manualHanger').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') lookupManual();
        });

        // Инициализация
        checkAuth();
    </script>
</body>
</html>
