# ============================================
# DOCKER COMPOSE - АТЕЛЬЕ "БРИГАДА"
# Полный стек: PostgreSQL + Backend + Frontend
# ============================================
version: '3.8'

services:
  # ============================================
  # DATABASE: PostgreSQL
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: atelier-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-atelier}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-atelier}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atelier-network

  # ============================================
  # BACKEND: Node.js + Express
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: atelier-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-atelier}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5001"
    networks:
      - atelier-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # FRONTEND: React + Nginx
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: atelier-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - atelier-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    driver: local

# ============================================
# NETWORKS
# ============================================
networks:
  atelier-network:
    driver: bridge
